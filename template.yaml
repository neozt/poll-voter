AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Real-time serverless poll voting application

Parameters:
  Environment:
    Type: String
    Default: Dev
  DBUsername:
    NoEcho: 'true'
    Description: Username for Aurora PostgreSQL database access
    Type: String
    MinLength: '1'
    MaxLength: '16'
    Default: "postgresuser"
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9\-]*'
    ConstraintDescription: must begin with a letter and contain only alphanumeric characters.
  DBPassword:
    NoEcho: 'true'
    Description: Password for Aurora PostgreSQL database access
    Type: String
    MinLength: '8'
    MaxLength: '41'
    Default: "postgrespassword"
    AllowedPattern: '[a-zA-Z0-9]*'
    ConstraintDescription: must contain only alphanumeric characters.
  ApiKeyExpiration:
    Type: Number
    Description: "The time, in seconds since the epoch, when the API key expires (max 365 days from now)"
    Default: 1807602358 # April 13, 2027

Resources:
  # API Gateway to submit claims via triggering the ClaimsApprovalStateMachine
  PollApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub "${AWS::StackName}-PollApi"
      StageName: !Ref Environment
      Cors:
        AllowMethods: "'OPTIONS, POST, GET'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'" # TODO Do not use this in Production

  CreatePollFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-CreatePollFunction"
      CodeUri: functions/create-poll
      Handler: create-poll.handler
      Runtime: nodejs24.x
      Architectures:
        - arm64
      Environment:
        Variables:
          DB_SECRET_ARN: !Ref PollDBSecret
          DB_CLUSTER_ARN: !Sub 'arn:aws:rds:${AWS::Region}:${AWS::AccountId}:cluster:${PollDatabaseCluster}'
          DB_NAME: "pollvoterdb"
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref PollDBSecret
            - Effect: Allow
              Action:
                - rds-data:ExecuteStatement
                - rds-data:BatchExecuteStatement
                - rds-data:BeginTransaction
                - rds-data:CommitTransaction
                - rds-data:RollbackTransaction
              Resource: !Sub 'arn:aws:rds:${AWS::Region}:${AWS::AccountId}:cluster:${PollDatabaseCluster}'
      Events:
        SubmitApi:
          Type: Api
          Properties:
            Path: /polls
            Method: post
            RestApiId: !Ref PollApi
    Metadata: # Manage esbuild properties
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: true

  ListPollFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-ListPollFunction"
      CodeUri: functions/list-polls
      Handler: list-polls.handler
      Runtime: nodejs24.x
      Architectures:
        - arm64
      Environment:
        Variables:
          DB_SECRET_ARN: !Ref PollDBSecret
          DB_CLUSTER_ARN: !Sub 'arn:aws:rds:${AWS::Region}:${AWS::AccountId}:cluster:${PollDatabaseCluster}'
          DB_NAME: "pollvoterdb"
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref PollDBSecret
            - Effect: Allow
              Action:
                - rds-data:ExecuteStatement
              Resource: !Sub 'arn:aws:rds:${AWS::Region}:${AWS::AccountId}:cluster:${PollDatabaseCluster}'
      Events:
        ListApi:
          Type: Api
          Properties:
            Path: /polls
            Method: get
            RestApiId: !Ref PollApi
    Metadata: # Manage esbuild properties
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: true

  AddVoteFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-AddVoteFunction"
      CodeUri: functions/add-vote
      Handler: add-vote.handler
      Runtime: nodejs24.x
      Timeout: 10
      Architectures:
        - arm64
      Environment:
        Variables:
          DB_SECRET_ARN: !Ref PollDBSecret
          DB_CLUSTER_ARN: !Sub 'arn:aws:rds:${AWS::Region}:${AWS::AccountId}:cluster:${PollDatabaseCluster}'
          DB_NAME: "pollvoterdb"
          APPSYNC_ENDPOINT: !Sub "${PollEventsApi.Dns.Http}"
          APPSYNC_API_KEY: !GetAtt PollApiKey.ApiKey
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref PollDBSecret
            - Effect: Allow
              Action:
                - rds-data:ExecuteStatement
                - rds-data:BatchExecuteStatement
                - rds-data:BeginTransaction
                - rds-data:CommitTransaction
                - rds-data:RollbackTransaction
              Resource: !Sub 'arn:aws:rds:${AWS::Region}:${AWS::AccountId}:cluster:${PollDatabaseCluster}'
            - Effect: Allow
              Action:
                - appsync:EventPublish
              Resource: !Sub "arn:aws:appsync:${AWS::Region}:${AWS::AccountId}:apis/${PollEventsApi.ApiId}/channels/polls/*"
      Events:
        SubmitApi:
          Type: Api
          Properties:
            Path: /polls/{pollId}/votes
            Method: post
            RestApiId: !Ref PollApi
    Metadata: # Manage esbuild properties
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: true

  GetPollFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-GetPollFunction"
      CodeUri: functions/get-poll
      Handler: get-poll.handler
      Runtime: nodejs24.x
      Timeout: 10
      Architectures:
        - arm64
      Environment:
        Variables:
          DB_SECRET_ARN: !Ref PollDBSecret
          DB_CLUSTER_ARN: !Sub 'arn:aws:rds:${AWS::Region}:${AWS::AccountId}:cluster:${PollDatabaseCluster}'
          DB_NAME: "pollvoterdb"
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref PollDBSecret
            - Effect: Allow
              Action:
                - rds-data:ExecuteStatement
              Resource: !Sub 'arn:aws:rds:${AWS::Region}:${AWS::AccountId}:cluster:${PollDatabaseCluster}'
      Events:
        SubmitApi:
          Type: Api
          Properties:
            Path: /polls/{pollId}
            Method: get
            RestApiId: !Ref PollApi
    Metadata: # Manage esbuild properties
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: true

  ParticipatePollFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-ParticipatePollFunction"
      CodeUri: functions/participate-poll
      Handler: participate-poll.handler
      Runtime: nodejs24.x
      Timeout: 10
      Architectures:
        - arm64
      Environment:
        Variables:
          DB_SECRET_ARN: !Ref PollDBSecret
          DB_CLUSTER_ARN: !Sub 'arn:aws:rds:${AWS::Region}:${AWS::AccountId}:cluster:${PollDatabaseCluster}'
          DB_NAME: "pollvoterdb"
          APPSYNC_ENDPOINT: !Sub "${PollEventsApi.Dns.Http}"
          APPSYNC_API_KEY: !GetAtt PollApiKey.ApiKey

      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref PollDBSecret
            - Effect: Allow
              Action:
                - rds-data:ExecuteStatement
              Resource: !Sub 'arn:aws:rds:${AWS::Region}:${AWS::AccountId}:cluster:${PollDatabaseCluster}'
            - Effect: Allow
              Action:
                - appsync:EventPublish
              Resource: !Sub "arn:aws:appsync:${AWS::Region}:${AWS::AccountId}:apis/${PollEventsApi.ApiId}/channels/participants/*"
      Events:
        SubmitApi:
          Type: Api
          Properties:
            Path: /polls/{pollId}/participants
            Method: post
            RestApiId: !Ref PollApi
    Metadata: # Manage esbuild properties
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: true


  PollEventsApi:
    Type: AWS::AppSync::Api
    Properties:
      Name: !Sub "${AWS::StackName}-PollEventsApi"
      EventConfig:
        AuthProviders:
          - AuthType: API_KEY
        ConnectionAuthModes:
          - AuthType: API_KEY
        DefaultPublishAuthModes:
          - AuthType: API_KEY
        DefaultSubscribeAuthModes:
          - AuthType: API_KEY

  PollsNamespace:
    Type: AWS::AppSync::ChannelNamespace
    Properties:
      ApiId: !GetAtt PollEventsApi.ApiId
      Name: "polls"
      PublishAuthModes:
        - AuthType: API_KEY
      SubscribeAuthModes:
        - AuthType: API_KEY

  PollApiKey:
    Type: AWS::AppSync::ApiKey
    Properties:
      ApiId: !GetAtt PollEventsApi.ApiId
      Description: "Key for frontend polls subscription"
      Expires: !Ref ApiKeyExpiration

  ParticipantsNamespace:
    Type: AWS::AppSync::ChannelNamespace
    Properties:
      ApiId: !GetAtt PollEventsApi.ApiId
      Name: "participants"
      PublishAuthModes:
        - AuthType: API_KEY
      SubscribeAuthModes:
        - AuthType: API_KEY

  # Security Group for Database Access
  PollDatabaseSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow PostgreSQL access from anywhere
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 0.0.0.0/0 # WARNING: Insecure. Restrict it in production

  PollDBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: Database credentials for Aurora
      SecretString: !Sub '{"username": "${DBUsername}", "password": "${DBPassword}"}'

  PollDBSecretAttachment:
    Type: AWS::SecretsManager::SecretTargetAttachment
    Properties:
      SecretId: !Ref PollDBSecret
      TargetId: !Ref PollDatabaseCluster
      TargetType: AWS::RDS::DBCluster

  # Aurora Serverless v2 PostgreSQL Database
  PollDatabaseCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      Engine: aurora-postgresql
      DatabaseName: pollvoterdb
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      EnableHttpEndpoint: true
      VpcSecurityGroupIds:
        - !GetAtt PollDatabaseSecurityGroup.GroupId
      ServerlessV2ScalingConfiguration:
        MinCapacity: 0.5
        MaxCapacity: 1.0

  PollDatabaseInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref PollDatabaseCluster
      DBInstanceClass: db.serverless
      Engine: aurora-postgresql
      PubliclyAccessible: true

  # S3 Bucket to host single page app website
  WebSiteBucket:
    Type: "AWS::S3::Bucket"
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - BucketKeyEnabled: true
      VersioningConfiguration:
        Status: Enabled
  WebSiteBucketPolicy:
    Type: "AWS::S3::BucketPolicy"
    Properties:
      Bucket: !Ref WebSiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Id: "PolicyForCloudFrontPrivateContent"
        Statement:
          - Sid: "AllowCloudFrontServicePrincipal"
            Effect: "Allow"
            Principal:
              Service: "cloudfront.amazonaws.com"
            Action: "s3:GetObject"
            Resource: !Join [ "", [ "arn:aws:s3:::", !Ref WebSiteBucket, "/*" ] ]
            Condition:
              StringEquals:
                "AWS:SourceArn": !Join [ "", [ "arn:aws:cloudfront::", !Ref "AWS::AccountId", ":distribution/", !Ref CloudFrontDistribution ] ]

  # CloudFront Function to rewrite requests for subdirectory index.html files
  CloudFrontIndexRewriterFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub "${AWS::StackName}-IndexRewriter"
      AutoPublish: true
      FunctionConfig:
        Comment: "Rewrites subdirectory requests to /index.html"
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
            var request = event.request;
            var uri = request.uri;

            // Serve static assets (files with extensions) as-is
            if (uri.includes('.')) {
                return request;
            }

            // For all Angular SPA routes (no file extension), serve index.html
            request.uri = '/index.html';
            return request;
        }

  # CloudFront Distribution for hosting the single page app website
  CloudFrontDistribution:
    Type: "AWS::CloudFront::Distribution"
    Properties:
      DistributionConfig:
        Origins:
          - DomainName: !GetAtt WebSiteBucket.RegionalDomainName
            Id: "myS3Origin"
            OriginAccessControlId: !GetAtt CloudFrontOriginAccessControl.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        Enabled: true
        DefaultRootObject: "index.html"
        HttpVersion: "http2"
        DefaultCacheBehavior:
          AllowedMethods:
            - "DELETE"
            - "GET"
            - "HEAD"
            - "OPTIONS"
            - "PATCH"
            - "POST"
            - "PUT"
          CachedMethods:
            - "GET"
            - "HEAD"
          TargetOriginId: "myS3Origin"
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: "none"
          ViewerProtocolPolicy: "allow-all"
          MinTTL: 0
          DefaultTTL: 3600
          MaxTTL: 86400
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt CloudFrontIndexRewriterFunction.FunctionMetadata.FunctionARN
        PriceClass: "PriceClass_200"
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
  CloudFrontOriginAccessControl:
    Type: "AWS::CloudFront::OriginAccessControl"
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${WebSiteBucket} OAC"
        OriginAccessControlOriginType: "s3"
        SigningBehavior: "always"
        SigningProtocol: "sigv4"

Outputs:
  PollApiUrl:
    Description: "Claims API Gateway URL"
    Value: !Sub "https://${PollApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"
  CloudFrontDistributionId:
    Description: "CloudFront Distribution ID for hosting web front end"
    Value: !Ref CloudFrontDistribution
  CloudFrontDistributionDomainName:
    Description: "CloudFront Distribution Domain Name for accessing web front end"
    Value: !GetAtt CloudFrontDistribution.DomainName
  WebS3BucketName:
    Description: "S3 Bucket for hosting web frontend"
    Value: !Ref WebSiteBucket
  RDSEndpoint:
    Description: "The connection endpoint for the Aurora Cluster"
    Value: !GetAtt PollDatabaseCluster.Endpoint.Address
  AppSyncApiKey:
    Description: "API Key for subscribing to stock updates"
    Value: !GetAtt PollApiKey.ApiKey
  AppSyncHttpEndpoint:
    Description: "API Key for subscribing to stock updates"
    Value: !GetAtt PollEventsApi.Dns.Http
  AppSyncRealtimeEndpoint:
    Description: "API Key for subscribing to stock updates"
    Value: !GetAtt PollEventsApi.Dns.Realtime
  AwsRegion:
    Description: "AWS Region"
    Value: !Ref AWS::Region